<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Top 5 Discoveries — Daily Breakthroughs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0A0A0F;
  --ink-soft: #3D3D4D;
  --ink-muted: #7A7A8C;
  --paper: #FAFAF7;
  --paper-warm: #F2F1EC;
  --paper-tint: #ECEAE2;
  --glow: #1A6BFF;
  --glow-pale: #EBF1FF;
  --accent: #FF5C35;
  --border: rgba(10,10,15,0.1);
  --border-strong: rgba(10,10,15,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Geist', system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

.topbar {
  position: sticky;
  top: 0;
  background: rgba(250,250,247,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
}

.hero {
  text-align: center;
  padding: 70px 24px 40px;
  max-width: 900px;
  margin: 0 auto;
}

h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(42px, 7vw, 72px);
  font-weight: 400;
  margin-bottom: 18px;
}

.hero-sub {
  font-size: 16px;
  color: var(--ink-muted);
  max-width: 600px;
  margin: 0 auto 30px;
  line-height: 1.7;
}

.discoveries-grid {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.discovery-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  transition: all 0.2s ease;
}

.discovery-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(10,10,15,0.08);
}

.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: 24px;
  margin-bottom: 10px;
}

.card-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink-soft);
  margin-bottom: 14px;
}

.card-link {
  font-size: 13px;
  color: var(--glow);
  text-decoration: none;
}

.error-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-muted);
}

footer {
  border-top: 1px solid var(--border);
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--ink-muted);
}

@media (max-width: 600px) {
  h1 { font-size: 42px; }
}
</style>
</head>
<body>

<nav class="topbar">
  <div>discoveries.today</div>
  <div id="topbar-date"></div>
</nav>

<section class="hero">
  <h1>Today's Top 5 Discoveries</h1>
  <p class="hero-sub">
    The five most remarkable breakthroughs and scientific discoveries from around the world — updated every day automatically.
  </p>
</section>

<div id="app"></div>

<footer>
  Powered by discoveries.json · Updated daily by GitHub Actions
</footer>

<script>
const JSON_PATH = 'discoveries.json';

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

document.getElementById('topbar-date').textContent =
  new Date().toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'long',
    day: 'numeric',
    year: 'numeric'
  });

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state">
      <h2>Couldn't load discoveries</h2>
      <p>${msg}</p>
    </div>
  `;
}

function renderCards(items) {
  const cards = items.map(item => `
    <div class="discovery-card">
      <div class="card-title">${item.title}</div>
      <div class="card-body">${item.summary}</div>
      <a class="card-link" href="${item.source_url}" target="_blank">Read more →</a>
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="discoveries-grid">${cards}</div>
  `;
}

async function fetchDiscoveries() {
  try {
    const res = await fetch(`${JSON_PATH}?t=${Date.now()}`);
    const data = await res.json();

    const items = data.items || [];

    if (!Array.isArray(items) || items.length === 0) {
      throw new Error('No discoveries available yet.');
    }

    renderCards(items.slice(0, 5));
  } catch (err) {
    renderError(err.message);
  }
}

fetchDiscoveries();
</script>

</body>
</html>
