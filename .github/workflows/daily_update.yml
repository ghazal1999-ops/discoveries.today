name: Daily Discovery Update

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to push discoveries.json back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history so rebase works cleanly

      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CX_ID: ${{ secrets.GOOGLE_SEARCH_ID }}
        run: |
          QUERY="scientific+discovery+today"
          URL="https://www.googleapis.com/customsearch/v1?q=${QUERY}&key=${API_KEY}&cx=${CX_ID}&num=5"

          echo "Fetching: $URL"
          curl -f -L -o raw.json "$URL"

          # Wrap raw Google response into the shape index.html expects:
          # { "date": "YYYY-MM-DD", "items": [ ... ] }
          DATE=$(date -u +%Y-%m-%d)
          jq --arg date "$DATE" '{ date: $date, items: .items }' raw.json > discoveries.json

          echo "discoveries.json written:"
          cat discoveries.json

      - name: Commit and Push
        run: |
          git config --global user.name "DiscoveryBot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest remote changes BEFORE committing — this prevents the
          # "rejected: fetch first" error seen in the logs
          git pull --rebase origin main

          git add discoveries.json

          # Only commit if discoveries.json actually changed
          if git diff --cached --quiet; then
            echo "No changes to discoveries.json — skipping commit"
          else
            git commit -m "Updated discoveries for $(date -u)"
            git push origin main
          fi
