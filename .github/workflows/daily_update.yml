name: Daily Discovery Update
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: gives the bot permission to save the file
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for Node 24 compatibility

      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CX_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
        run: |
          # Use quotes around the URL to prevent special characters from breaking it
          QUERY="top+scientific+discovery+$(date +'%B+%d+%Y')"
          curl -o discoveries.json "https://www.googleapis.com/customsearch/v1?q=$QUERY&key=$API_KEY&cx=$CX_ID&num=5"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discoveries.json
          git commit -m "Daily update: $(date)" || echo "No changes to commit"
          git push
