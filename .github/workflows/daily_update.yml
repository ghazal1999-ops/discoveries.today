name: Daily Discovery Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CX_ID: ${{ secrets.GOOGLE_SEARCH_ID }}
        run: |
          URL="https://www.googleapis.com/customsearch/v1?q=scientific+breakthrough+OR+discovery+OR+research+news&key=${API_KEY}&cx=${CX_ID}&num=5"

          echo "Fetching discoveries..."
          curl -L -o raw.json "$URL"

          echo "Raw Google response:"
          cat raw.json

          DATE=$(date -u +%Y-%m-%d)
          COUNT=$(jq '.items | length // 0' raw.json)

          if [ "$COUNT" -eq 0 ]; then
            echo "No search results returned. Keeping old discoveries.json"
            exit 0
          fi

          jq --arg date "$DATE" '
            {
              date: $date,
              items: [
                .items[] | {
                  title: .title,
                  summary: (.snippet // "No summary available."),
                  category: "Science",
                  source: (.displayLink // "unknown"),
                  source_url: .link,
                  impact: 3
                }
              ]
            }
          ' raw.json > discoveries.json

          echo "Updated discoveries.json:"
          cat discoveries.json

      - name: Commit and Push
        run: |
          git config --global user.name "DiscoveryBot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase origin/main || true

          git add discoveries.json

          if git diff --cached --quiet; then
            echo "No changes to discoveries.json"
            exit 0
          fi

          git commit -m "Updated discoveries for $(date -u)"
          git push --force-with-lease origin HEAD:main
