name: Daily Discovery Update
on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight
  workflow_dispatch: # Allows you to click "Run" manually to test it

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SEARCH_ID: ${{ secrets.GOOGLE_SEARCH_ID }}
        run: |
          # We search for "breakthrough" or "discovery" with today's date
          QUERY="top+scientific+discovery+$(date +'%B+%d+%Y')"
          curl "https://www.googleapis.com/customsearch/v1?q=$QUERY&key=$API_KEY&cx=$SEARCH_ID&num=5" > discoveries.json

      - name: Commit and Push
        run: |
          git config --global user.name "DiscoveryBot"
          git config --global user.email "bot@github.com"
          git add discoveries.json
          git commit -m "Updated discoveries for $(date)"
          git push
