name: Daily Discovery Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CX_ID: ${{ secrets.GOOGLE_SEARCH_ID }}
        run: |
          # We use a simplified query and double-quotes to avoid Exit Code 3
          QUERY="scientific+discovery+today"
          URL="https://www.googleapis.com/customsearch/v1?q=$QUERY&key=$API_KEY&cx=$CX_ID&num=5"
          
          # This saves the result and prevents the script from failing silently
          curl -f -L -o discoveries.json "$URL"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add discoveries.json
          git commit -m "Daily Discovery Update" || echo "No changes"
          # This 'pull --rebase' solves the "rejected" error you see in the screenshot
          git pull --rebase origin main
          git push origin main
