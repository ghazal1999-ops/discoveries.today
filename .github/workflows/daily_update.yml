name: Daily Discovery Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # ✅ Fixed: upgraded from v3
        with:
          fetch-depth: 0

  - name: Install jq
    run: sudo apt-get update && sudo apt-get install -y jq
    
      - name: Fetch Discoveries
        env:
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CX_ID: ${{ secrets.GOOGLE_SEARCH_ID }}
        run: |
          # ✅ Fixed: use %20 instead of + for safer URL encoding
          QUERY="scientific%20discovery%20today"
          URL="https://www.googleapis.com/customsearch/v1?q=${QUERY}&key=${API_KEY}&cx=${CX_ID}&num=5"

          # ✅ Added: guard clause — fail early with a clear message if secrets are missing
          if [ -z "$API_KEY" ] || [ -z "$CX_ID" ]; then
            echo "ERROR: GOOGLE_API_KEY or GOOGLE_SEARCH_ID secret is not set."
            exit 1
          fi

          echo "Fetching discoveries..."
          curl -f -L -o raw.json "$URL"

          DATE=$(date -u +%Y-%m-%d)
          jq --arg date "$DATE" '{
            date: $date,
            items: [.items[] | {
              title: .title,
              summary: .snippet,
              category: "Science",
              source: .displayLink,
              source_url: .link,
              impact: 3
            }]
          }' raw.json > discoveries.json

          echo "discoveries.json written:"
          cat discoveries.json

      - name: Commit and Push
        run: |
          git config --global user.name "DiscoveryBot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add discoveries.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Updated discoveries for $(date -u)"
            git push origin main
          fi
